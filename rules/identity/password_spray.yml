title: Password Spray Against Multiple Accounts
id: 3d9e7f1a-6c2b-4a8d-9e3f-1b2c3d4e5f6a
status: stable
description: |
    Detects a password spray pattern: a small number of source IPs
    generating failed authentication attempts against many distinct
    user accounts within a short window. Distinguishes from brute force
    (many attempts, one account) by requiring a high distinct-account
    count with a low per-account attempt count.
references:
    - https://attack.mitre.org/techniques/T1110/003/
author: RoHaN
date: 2026-07-01
modified: 2026-07-01
tags:
    - attack.credential-access
    - attack.t1110.003
logsource:
    product: google_workspace
    service: login
detection:
    selection:
        event.name: 'login_failure'
        failure.type: 'invalid_password'
    timeframe: 10m
    condition: selection | count(target.email) by source.ip > 10
falsepositives:
    - Misconfigured mobile devices or legacy apps retrying cached bad credentials
    - Shared NAT/corporate egress IP with many legitimate users behind it
    - Credential stuffing testing tools run by internal security team (should be allowlisted by source IP)
level: high
fields:
    - source.ip
    - target.email
    - event.time
