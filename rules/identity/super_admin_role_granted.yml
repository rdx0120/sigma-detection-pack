title: Super-Admin Role Granted in Google Workspace
id: 9c0d1e2f-3a4b-4c5d-8e9f-0a1b2c3d4e5f
status: stable
description: |
    Detects when the Super Admin role (or another highly privileged
    admin role) is granted to a user. This is a high-value target event
    for both insider threat and post-compromise privilege escalation,
    and should always be reviewed regardless of who performed it.
references:
    - https://attack.mitre.org/techniques/T1098/
author: RoHaN
date: 2026-07-01
modified: 2026-07-01
tags:
    - attack.persistence
    - attack.privilege-escalation
    - attack.t1098
logsource:
    product: google_workspace
    service: admin
detection:
    selection:
        event.name: 'ASSIGN_ROLE'
        role.name|contains: 'Super Admin'
    condition: selection
falsepositives:
    - Planned administrative onboarding of a new IT staff member
    - Scheduled admin role rotation as part of break-glass procedures
level: critical
fields:
    - actor.email
    - target.email
    - role.name
    - event.time
