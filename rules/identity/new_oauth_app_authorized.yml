title: New Third-Party OAuth Application Authorized in Google Workspace
id: 1a2b3c4d-5e6f-4a7b-8c9d-0e1f2a3b4c5d
status: stable
description: |
    Detects when a user grants a new third-party OAuth application access
    to their Google Workspace account/data. This is a common persistence
    and data-exfiltration vector following account compromise or phishing,
    and is frequently missed because it does not require a password reset
    or trigger MFA.

    Deployment note: in a real-world tuning against a live tenant, the majority
    of raw "Grant" events were first-party Google clients (Admin Console,
    GCPW native desktop login, Calendar, Gemini for Workspace) rather than
    genuine third-party authorizations. The exclusion list below prioritizes
    filtering first-party Google client IDs first, since that removes the
    bulk of volume in a single pass, before any per-app or per-user tuning is needed.
references:
    - https://attack.mitre.org/techniques/T1550/
    - https://attack.mitre.org/techniques/T1528/
author: RoHaN
date: 2026-07-01
modified: 2026-07-14
tags:
    - attack.persistence
    - attack.t1550
    - attack.t1528
logsource:
    product: google_workspace
    service: token
detection:
    selection:
        event.name: 'authorize'
    filter_first_party_google:
        client_id:
            - 'google-admin-console-native'
            - 'gcpw-native-windows-login'
            - 'google-calendar-web'
            - 'google-gemini-workspace'
    filter_known_good:
        client_id:
            - 'known-internal-app-id-1'
            - 'known-internal-app-id-2'
    condition: selection and not (filter_first_party_google or filter_known_good)
falsepositives:
    - First-party Google clients (Admin Console, GCPW, Calendar, Gemini) — high volume, expected, filtered above
    - A source IP differing from an account's usual egress due to legitimate VPN use — observed in production and should not, on its own, be treated as suspicious for this rule
    - Legitimate adoption of a new approved SaaS tool (calendar, e-sign, scheduling apps)
    - IT-approved integrations not yet added to the allowlist
level: medium
fields:
    - actor.email
    - client_id
    - app.name
    - scope.value
    - event.time
