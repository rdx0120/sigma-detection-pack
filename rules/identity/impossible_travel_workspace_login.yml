title: Google Workspace Impossible Travel Login
id: 8f2a1c3e-4b5d-4e6f-9a1b-2c3d4e5f6a7b
status: experimental
description: |
    Detects a successful Google Workspace login from a country/region that is
    geographically implausible given a prior successful login for the same
    user within a short time window (i.e., the two locations cannot be
    reached by real-world travel in the elapsed time).
references:
    - https://attack.mitre.org/techniques/T1078/
author: RoHaN
date: 2026-07-01
modified: 2026-07-01
tags:
    - attack.initial-access
    - attack.t1078
logsource:
    product: google_workspace
    service: login
detection:
    selection:
        event.name: 'login_success'
    condition: selection | near
    # NOTE: Sigma's native rule language does not compute geo-velocity.
    # In production this rule is implemented as a correlation/enrichment
    # rule in Wazuh (or a scheduled query) that:
    #   1. Buffers the last successful login location + timestamp per user
    #   2. On each new successful login, computes distance vs. previous
    #      login location and elapsed time
    #   3. Fires if implied travel speed > 700 mph (commercial flight speed)
    # This file documents the DETECTION LOGIC and log fields required;
    # see runbooks/impossible_travel.md for the enrichment implementation.
falsepositives:
    - Legitimate VPN or corporate proxy use that changes apparent geo-location
    - Traveling users with cloud-synced sessions across multiple regions
    - Mobile carrier IP reassignment misreporting geo-location
level: high
fields:
    - actor.email
    - source.geo.country_name
    - source.ip
    - event.time
