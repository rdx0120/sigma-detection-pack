title: EDR Agent Stopped, Uninstalled, or Suppressed
id: 5f6a7b8c-9d0e-4f1a-8b2c-3d4e5f6a7b8c
status: stable
description: |
    Detects an EDR agent (Bitdefender GravityZone) service being
    stopped, its process killed, or its protection being disabled
    via policy/tamper-protection bypass. Attackers routinely disable
    endpoint protection prior to deploying secondary payloads or
    ransomware; this event should always be treated as high priority
    even if it later proves to be legitimate maintenance.
references:
    - https://attack.mitre.org/techniques/T1562/001/
author: RoHaN
date: 2026-07-01
modified: 2026-07-01
tags:
    - attack.defense-evasion
    - attack.t1562.001
logsource:
    category: process_creation
    product: windows
detection:
    selection_service_stop:
        CommandLine|contains:
            - 'sc stop'
            - 'sc.exe stop'
            - 'net stop'
        CommandLine|contains|all:
            - 'stop'
        CommandLine|re: '(?i)(bitdefender|epsecurityservice|epprotectedservice|gravityzone)'
    selection_taskkill:
        Image|endswith: '\taskkill.exe'
        CommandLine|re: '(?i)(bitdefender|epsecurityservice|epprotectedservice)'
    condition: selection_service_stop or selection_taskkill
falsepositives:
    - Planned agent upgrade/reinstall performed by IT
    - Vendor-authorized uninstall during endpoint decommissioning
level: critical
fields:
    - Image
    - CommandLine
    - User
    - ComputerName
