title: Suspicious Encoded PowerShell Command Execution
id: 2e3f4a5b-6c7d-4e8f-9a0b-1c2d3e4f5a6b
status: stable
description: |
    Detects PowerShell execution using base64-encoded commands
    (-enc/-EncodedCommand) or common download-cradle patterns
    (IEX, DownloadString, Net.WebClient). These are heavily used
    by commodity malware and living-off-the-land attacks to evade
    plaintext command-line logging and basic AV signatures.
references:
    - https://attack.mitre.org/techniques/T1059/001/
author: RoHaN
date: 2026-07-01
modified: 2026-07-01
tags:
    - attack.execution
    - attack.t1059.001
logsource:
    category: process_creation
    product: windows
detection:
    selection_encoded:
        Image|endswith: '\powershell.exe'
        CommandLine|contains:
            - '-enc'
            - '-EncodedCommand'
            - '-e '
    selection_cradle:
        Image|endswith: '\powershell.exe'
        CommandLine|contains:
            - 'IEX'
            - 'Invoke-Expression'
            - 'DownloadString'
            - 'Net.WebClient'
            - 'Invoke-WebRequest'
    condition: selection_encoded or selection_cradle
falsepositives:
    - Legitimate admin scripts and RMM tooling (Atera) that use encoded commands for reliability
    - Software deployment tools that wrap installers in PowerShell download cradles
level: high
fields:
    - Image
    - CommandLine
    - User
    - ComputerName
